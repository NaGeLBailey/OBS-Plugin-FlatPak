id: com.obsproject.Studio.Plugin.ImageReaction
runtime: com.obsproject.Studio
runtime-version: stable
branch: stable
sdk: org.freedesktop.Sdk//25.08
build-extension: true
separate-locales: false
build-options:
  prefix: /app/plugins/ImageReaction
modules:
  - name: image-reaction
    buildsystem: cmake
    builddir: true
    config-opts:
    post-install:
      - install -Dm644 --target-directory=${FLATPAK_DEST}/share/metainfo ../${FLATPAK_ID}.metainfo.xml
    sources:
      - type: git
        url: https://github.com/scaledteam/obs-image-reaction.git
        tag: 1.3
        commit: 4cd345e78c714e80e894cfb51c72b94135a6014d
        x-checker-data:
          type: git
          is-main-source: true
          tag-pattern: ^([\d.]+)$
      - type: file
        path: com.obsproject.Studio.Plugin.ImageReaction.metainfo.xml