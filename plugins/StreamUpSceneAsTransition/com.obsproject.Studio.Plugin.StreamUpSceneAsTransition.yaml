id: com.obsproject.Studio.Plugin.StreamUpSceneAsTransition
runtime: com.obsproject.Studio
runtime-version: stable
branch: stable
sdk: org.freedesktop.Sdk//25.08
build-extension: true
separate-locales: false
build-options:
  prefix: /app/plugins/StreamUpSceneAsTransition
modules:
  - name: stream-up-scene-as-transition
    buildsystem: cmake
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_OUT_OF_TREE=On
    post-install:
      - install -Dm644 --target-directory=${FLATPAK_DEST}/share/metainfo ${FLATPAK_ID}.metainfo.xml
    sources:
      - type: git
        url: https://github.com/StreamUPTips/obs-streamup-scene-as-transition.git
        tag: 1.3.1
        commit: 79ca8ede67701cff037d2b14afb025118546efd8
        x-checker-data:
          type: git
          is-main-source: true
          tag-pattern: ^([\d.]+)$
      - type: file
        path: com.obsproject.Studio.Plugin.StreamUpSceneAsTransition.metainfo.xml